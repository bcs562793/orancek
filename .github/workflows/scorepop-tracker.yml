# ══════════════════════════════════════════════════════════════════════
# SCOREPOP — GitHub Actions Workflow
#
# 2 iş tanımı:
#   1. odds-tracker    : Her 5-6 saatte bir tetiklenir, 4.5 saat boyunca
#                        Nesine'yi izler ve snapshot'ları kaydeder.
#   2. weekly-analysis : Pazartesi sabahı çalışır, sinyal → sonuç raporu.
#
# Gerekli Secrets:
#   SUPABASE_URL  — https://xxxx.supabase.co
#   SUPABASE_KEY  — service_role anahtarı (anon değil!)
# ══════════════════════════════════════════════════════════════════════

name: ScorePop Odds Tracker

on:
  schedule:
    # Her 6 saatte bir — 00:00 06:00 12:00 18:00 UTC (03:00 09:00 15:00 21:00 TR)
    - cron: '0 0,6,12,18 * * *'
    # Cmt/Paz ek turlar — 03:00 09:00 15:00 21:00 UTC (06:00 12:00 18:00 00:00 TR)
    - cron: '0 3,9,15,21 * * 6,0'
    # Haftalık analiz — Pazartesi 05:00 UTC (08:00 TR)
    - cron: '0 5 * * 1'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalışma modu'
        required: true
        default: 'tracker'
        type: choice
        options:
          - tracker
          - analyze
          - analyze-7d
          - analyze-30d

concurrency:
  group: scorepop-tracker
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1: ODDS TRACKER
  # ════════════════════════════════════════════════════════════════════
  odds-tracker:
    name: 📊 Odds Tracker (4.5h Loop)
    runs-on: ubuntu-latest
    timeout-minutes: 290

    if: |
      (github.event_name == 'schedule' && github.event.schedule != '0 5 * * 1')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'tracker')

    steps:
      - name: 📥 Repo checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Bağımlılık kurulum
        run: npm install

      - name: 🔍 Odds Tracker başlat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_RUNTIME_MS: '16200000'
          INTERVAL_MS: '300000'
        run: node odds-tracker.js

      - name: 📋 Özet
        if: always()
        run: |
          echo "=== Tracker Tamamlandı ==="
          echo "Çalışma zamanı: $(date -u)"

  # ════════════════════════════════════════════════════════════════════
  # JOB 2: HAFTALIK ANALİZ
  # ════════════════════════════════════════════════════════════════════
  weekly-analysis:
    name: 📈 Haftalık Sinyal Analizi
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1')
      || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.mode, 'analyze'))

    steps:
      - name: 📥 Repo checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js kurulum
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Bağımlılık kurulum
        run: npm install

      - name: 📊 Analiz çalıştır
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [[ "$MODE" == "analyze-30d" ]]; then
            DAYS=30
          else
            DAYS=7
          fi
          echo "=== ${DAYS} günlük analiz başlatılıyor ==="
          node analyzer.js --days $DAYS --min-lift 1.35

      - name: 📤 Artifact kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-analysis-${{ github.run_id }}
          path: '*.log'
          retention-days: 30
          if-no-files-found: ignore
