name: 🧠 Autonomous AI Trainer

on:
  schedule:
    # Her Pazar gecesi UTC ile 00:00'da (Türkiye saati ile 03:00) çalışır
    - cron: '0 0 * * 0'
  workflow_dispatch: # İstediğiniz zaman GitHub üzerinden manuel tetikleyebilmeniz için

jobs:
  train_model:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Git push yapabilmesi için izin veriyoruz

    steps:
      - name: Repoyu Çek (Checkout)
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Makine Öğrenmesi Kütüphanelerini Yükle
        run: |
          pip install xgboost pandas numpy supabase

      - name: Otonom Eğitimi Başlat (XGBoost)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python autonomous_trainer.py

      - name: Yeni Öğrenilen Zekayı Repoya Kaydet (Git Push)
        run: |
          git config user.name "ScorePop AI Bot"
          git config user.email "ai-bot@scorepop.com"
          git add ml_predictions.json dynamic_config.json xgboost_brain.model
          git commit -m "🤖 [Otonom] Yapay zeka modeli ve eşikler güncellendi" || echo "Değişiklik yok"
          git pull --rebase origin main
          git push origin main
