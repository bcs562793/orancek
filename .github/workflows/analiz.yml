name: ScorePop AI Tracker

on:
  schedule:
    # Günde 4 vardiya çalışır (Her biri ~4.75 saat sürer, birbirini takip eder)
    # 05:00, 10:00, 15:00, 20:00 UTC (TR saatiyle 08:00, 13:00, 18:00, 23:00)
    - cron: "0 5,10,15,20 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Mail göndermeden test et"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      lookahead_hours:
        description: "Kaç saat sonrasına kadar maçlar izlensin"
        required: false
        default: "8"
      interval_minutes:
        description: "Döngü aralığı (dakika)"
        required: false
        default: "5"

concurrency:
  group: ai-tracker
  cancel-in-progress: false    # Önceki oturum bitmeden yenisi başlamasın (Devir teslim güvenliği)

jobs:
  track:
    name: "Piyasa İzleme + AI Analizi"
    runs-on: ubuntu-latest
    permissions:           # BOTA BURADA YETKİ VERİYORUZ
      contents: write      # REPOYA YAZMA YETKİSİ
    timeout-minutes: 290       # 4 saat 50 dk — GitHub Actions 6 saat limiti altında

    steps:
      # ── 1. Repo ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Not: package-lock.json hatası almamak için 'cache: "npm"' satırı kaldırıldı.

      # ── 3. Bağımlılıklar ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install && npm install @supabase/supabase-js ws

      # ── 4. Cache geri yükle ────────────────────────────────────────
      # Önceki oturumun piyasa snapshot'larını, alarmlarını ve ÖĞRENME HAFIZASINI yükle
      - name: Restore tracker cache
        uses: actions/cache@v4
        with:
          path: |
            tracker_cache.json
            fired_alerts.json
            learned_memory.json
          key: scorepop-cache-${{ github.run_id }}
          restore-keys: |
            scorepop-cache-
            
      - name: Gerekli Paketleri Kur
        run: npm install ws @supabase/supabase-js      

      # ── 5. Tracker'ı çalıştır ──────────────────────────────────────
      - name: Run AI Tracker
        env:
          # Supabase Veritabanı (Canlı skorlar için)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

          # Bahis piyasası
          LOOKAHEAD_HOURS:  ${{ github.event.inputs.lookahead_hours || '8' }}
          # Direkt olarak MS yerine dakikayı çevresel değişken yapıyoruz
          INTERVAL_MINUTES: ${{ github.event.inputs.interval_minutes || '5' }}
          MAX_RUNTIME_MS:   "17100000"    # 4.75 saat

          # Cache dosyaları (learned_memory eklendi)
          CACHE_FILE:       tracker_cache.json
          FIRED_FILE:       fired_alerts.json
          MEMORY_FILE:      learned_memory.json

          # E-posta
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}

          # Mod
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

        # Çarpma işlemini kabuk(shell) üzerinde yapıp INTERVAL_MS olarak dışarı aktarıyoruz
        run: |
          export INTERVAL_MS=$(($INTERVAL_MINUTES * 60000))
          node odds-tracker.js

      # ── 6. Cache kaydet ────────────────────────────────────────────
      - name: Save tracker cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            tracker_cache.json
            fired_alerts.json
            learned_memory.json
          key: scorepop-cache-${{ github.run_id }}

      # ── 7. Artifact olarak da sakla (7 gün) ───────────────────────
      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorepop-cache-${{ github.run_number }}
          path: |
            tracker_cache.json
            fired_alerts.json
            learned_memory.json
          retention-days: 7
