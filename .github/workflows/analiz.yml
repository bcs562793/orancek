name: ScorePop AI Tracker

on:
  schedule:
    # Her gün 05:00–23:00 UTC arası çalışır (gece dinlenir)
    # Sabah 05:00 UTC → 08:00 TR
    - cron: "0 5 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Mail göndermeden test et"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      lookahead_hours:
        description: "Kaç saat sonrasına kadar maçlar izlensin"
        required: false
        default: "8"
      interval_minutes:
        description: "Döngü aralığı (dakika)"
        required: false
        default: "5"

concurrency:
  group: ai-tracker
  cancel-in-progress: false    # Önceki oturum bitmeden yenisi başlamasın

jobs:
  track:
    name: "Piyasa İzleme + AI Analizi"
    runs-on: ubuntu-latest
    timeout-minutes: 290       # 4 saat 50 dk — GitHub Actions 6 saat limiti altında

    steps:
      # ── 1. Repo ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Bağımlılıklar ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Cache geri yükle ────────────────────────────────────────
      # Önceki oturumun piyasa snapshot'larını ve fired alarmları yükle
      - name: Restore tracker cache
        uses: actions/cache@v4
        with:
          path: |
            tracker_cache.json
            fired_alerts.json
          key: scorepop-cache-${{ github.run_id }}
          restore-keys: |
            scorepop-cache-

      # ── 5. Tracker'ı çalıştır ──────────────────────────────────────
      - name: Run AI Tracker
        env:
          # Bahis piyasası
          FIXTURES_FILE:    future_matches.json
          LOOKAHEAD_HOURS:  ${{ github.event.inputs.lookahead_hours || '8' }}
          INTERVAL_MS:      ${{ fromJSON(github.event.inputs.interval_minutes || '5') * 60000 }}
          MAX_RUNTIME_MS:   "17100000"    # 4.75 saat

          # Cache dosyaları
          CACHE_FILE:       tracker_cache.json
          FIRED_FILE:       fired_alerts.json

          # AI
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # E-posta
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}

          # Mod
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

        run: node ai_tracker.js

      # ── 6. Cache kaydet ────────────────────────────────────────────
      - name: Save tracker cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            tracker_cache.json
            fired_alerts.json
          key: scorepop-cache-${{ github.run_id }}

      # ── 7. Artifact olarak da sakla (7 gün) ───────────────────────
      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorepop-cache-${{ github.run_number }}
          path: |
            tracker_cache.json
            fired_alerts.json
          retention-days: 7
