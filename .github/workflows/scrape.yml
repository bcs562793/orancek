name: 🏟️ Mackolik Odds Scraper

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Tarih (YYYY-MM-DD) — boş bırakırsan bugün"
        required: false
        default: ""
        type: string

      iddaa_only:
        description: "Sadece iddaa oranı olan maçlar"
        required: false
        default: true
        type: boolean

      dry_run:
        description: "Dry run — sadece listele, kaydetme"
        required: false
        default: false
        type: boolean

      save_supabase:
        description: "Supabase'e kaydet (secret gerekir)"
        required: false
        default: false
        type: boolean

      request_delay:
        description: "İstekler arası bekleme (saniye)"
        required: false
        default: "1.5"
        type: string

concurrency:
  group: mackolik-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: "Oranları Çek → JSON.GZ"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Tarihi belirle
        id: set_date
        run: |
          if [ -z "${{ inputs.date }}" ]; then
            echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          else
            echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          fi

      - name: Oranları çek
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p output

          ARGS="--date ${{ steps.set_date.outputs.date }}"
          ARGS="$ARGS --delay ${{ inputs.request_delay }}"
          ARGS="$ARGS --output-json output/odds_${{ steps.set_date.outputs.date }}.json.gz"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "${{ inputs.iddaa_only }}" = "false" ]; then
            ARGS="$ARGS --all"
          fi

          if [ "${{ inputs.save_supabase }}" = "false" ]; then
            ARGS="$ARGS --no-supabase"
          fi

          echo "Komut: python -m scraper.main $ARGS"
          python -m scraper.main $ARGS

      - name: JSON.GZ artifact yükle
        if: "!inputs.dry_run && always()"
        uses: actions/upload-artifact@v4
        with:
          name: "odds-${{ steps.set_date.outputs.date }}"
          path: output/odds_*.json.gz
          retention-days: 90
          if-no-files-found: warn
          compression-level: 0   # zaten gzip, tekrar sıkıştırma

      - name: Dosya boyutunu göster
        if: "!inputs.dry_run"
        run: |
          ls -lh output/ 2>/dev/null || echo "output/ boş"

      - name: İş özeti
        if: always()
        run: |
          echo "## 📊 Scrape Özeti" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Tarih        | ${{ steps.set_date.outputs.date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Dry Run      | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 İddaa Only   | ${{ inputs.iddaa_only }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Supabase     | ${{ inputs.save_supabase }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ Gecikme      | ${{ inputs.request_delay }}s |" >> $GITHUB_STEP_SUMMARY
