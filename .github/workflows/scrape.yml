name: 🏟️ Odds Scraper (Sofascore + Mackolik)

on:
  workflow_dispatch:
    inputs:

      date:
        description: "Tek tarih (YYYY-MM-DD) — boş bırakırsan bugün"
        required: false
        default: ""
        type: string

      date_from:
        description: "Aralık başlangıcı (YYYY-MM-DD) — date ile birlikte kullanma"
        required: false
        default: ""
        type: string

      date_to:
        description: "Aralık bitişi (YYYY-MM-DD) — date_from ile birlikte kullanılır"
        required: false
        default: ""
        type: string

      split:
        description: "Aralıkta her güne ayrı .json.gz yaz (kapalıysa tek birleşik dosya)"
        required: false
        default: false
        type: boolean

      mode:
        description: "Kaynak"
        required: false
        default: "combined"
        type: choice
        options:
          - combined
          - sofa
          - mac

      sofa_all_markets:
        description: "Sofascore: her maç için tüm marketleri çek (yavaş!)"
        required: false
        default: false
        type: boolean

      iddaa_only:
        description: "Mackolik: sadece iddaa oranı olan maçlar"
        required: false
        default: true
        type: boolean

      dry_run:
        description: "Dry run — sadece listele, kaydetme"
        required: false
        default: false
        type: boolean

      save_supabase:
        description: "Supabase'e kaydet"
        required: false
        default: false
        type: boolean

      sofa_delay:
        description: "Sofascore istek gecikmesi (s)"
        required: false
        default: "0.5"
        type: string

      mac_delay:
        description: "Mackolik istek gecikmesi (s)"
        required: false
        default: "1.5"
        type: string

concurrency:
  group: odds-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: "Oranları Çek → data/ klasörüne commit"
    runs-on: ubuntu-latest
    timeout-minutes: 360   # aralık modunda uzun sürebilir

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      # ── Tarih / aralık parametrelerini çöz ────────────────────────────────
      - name: Tarih parametrelerini belirle
        id: dates
        run: |
          DATE_FROM="${{ inputs.date_from }}"
          DATE_TO="${{ inputs.date_to }}"
          DATE="${{ inputs.date }}"

          if [ -n "$DATE_FROM" ]; then
            # Aralık modu
            [ -z "$DATE_TO" ] && DATE_TO=$(date -u +%Y-%m-%d)
            echo "mode=range"     >> $GITHUB_OUTPUT
            echo "date_from=$DATE_FROM" >> $GITHUB_OUTPUT
            echo "date_to=$DATE_TO"     >> $GITHUB_OUTPUT
            echo "label=${DATE_FROM}_${DATE_TO}" >> $GITHUB_OUTPUT
            echo "📅 Aralık modu: $DATE_FROM → $DATE_TO"
          else
            # Tek gün modu
            [ -z "$DATE" ] && DATE=$(date -u +%Y-%m-%d)
            echo "mode=single"    >> $GITHUB_OUTPUT
            echo "date_from=$DATE"     >> $GITHUB_OUTPUT
            echo "date_to=$DATE"       >> $GITHUB_OUTPUT
            echo "label=$DATE"         >> $GITHUB_OUTPUT
            echo "📅 Tek gün modu: $DATE"
          fi

      # ── Scraper çalıştır ──────────────────────────────────────────────────
      - name: Oranları çek
        id: scrape
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p data

          # ── Argümanları oluştur ──
          if [ "${{ steps.dates.outputs.mode }}" = "range" ]; then
            ARGS="--date-from ${{ steps.dates.outputs.date_from }} --date-to ${{ steps.dates.outputs.date_to }}"
            if [ "${{ inputs.split }}" = "true" ]; then
              ARGS="$ARGS --split --output-json data/odds_{date}.json.gz"
              echo "outpattern=data/odds_*.json.gz" >> $GITHUB_OUTPUT
            else
              OUTFILE="data/odds_${{ steps.dates.outputs.date_from }}_${{ steps.dates.outputs.date_to }}.json.gz"
              ARGS="$ARGS --output-json $OUTFILE"
              echo "outpattern=$OUTFILE" >> $GITHUB_OUTPUT
              echo "outfile=$OUTFILE"    >> $GITHUB_OUTPUT
            fi
          else
            DATE="${{ steps.dates.outputs.date_from }}"
            OUTFILE="data/odds_${DATE}.json.gz"
            ARGS="--date $DATE --output-json $OUTFILE"
            echo "outpattern=$OUTFILE" >> $GITHUB_OUTPUT
            echo "outfile=$OUTFILE"    >> $GITHUB_OUTPUT
          fi

          ARGS="$ARGS --mode ${{ inputs.mode }}"
          ARGS="$ARGS --sofa-delay ${{ inputs.sofa_delay }}"
          ARGS="$ARGS --mac-delay ${{ inputs.mac_delay }}"

          [ "${{ inputs.dry_run }}"          = "true"  ] && ARGS="$ARGS --dry-run"
          [ "${{ inputs.iddaa_only }}"       = "false" ] && ARGS="$ARGS --all"
          [ "${{ inputs.sofa_all_markets }}" = "true"  ] && ARGS="$ARGS --sofa-all-markets"
          [ "${{ inputs.save_supabase }}"    = "false" ] && ARGS="$ARGS --no-supabase"

          echo "▶ python -m scraper.main $ARGS"
          python -m scraper.main $ARGS

      # ── Git config ────────────────────────────────────────────────────────
      - name: Git config
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Dosya bilgisi + commit + push (tek adımda — env var geçişi yok) ──
      - name: Commit & push
        if: ${{ inputs.dry_run != true }}
        run: |
          LABEL="${{ steps.dates.outputs.label }}"
          MODE="${{ inputs.mode }}"

          # Maç sayısını doğrudan bu adımda say
          TOTAL=0
          SEEN=""
          while IFS= read -r -d $'\0' FILE; do
            [[ "$SEEN" == *"|$FILE|"* ]] && continue
            SEEN="$SEEN|$FILE|"
            N=$(zcat "$FILE" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
            TOTAL=$((TOTAL + N))
          done < <(find data/ -name "odds_*.json.gz" -print0 | sort -z)

          echo "Toplam maç: $TOTAL"

          # Özet tablosu
          echo "### 📦 Çıktı Dosyaları" >> $GITHUB_STEP_SUMMARY
          echo "| Dosya | Boyut | Maç |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|-----|" >> $GITHUB_STEP_SUMMARY
          SEEN=""
          while IFS= read -r -d $'\0' FILE; do
            [[ "$SEEN" == *"|$FILE|"* ]] && continue
            SEEN="$SEEN|$FILE|"
            SIZE=$(du -sh "$FILE" | cut -f1)
            N=$(zcat "$FILE" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
            echo "| \`$FILE\` | $SIZE | $N |" >> $GITHUB_STEP_SUMMARY
          done < <(find data/ -name "odds_*.json.gz" -print0 | sort -z)
          echo "**Toplam: $TOTAL maç**" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL" = "0" ]; then
            echo "❌ Hiç maç çekilemedi. Commit atlandı."
            exit 1
          fi

          git add data/odds_*.json.gz

          if git diff --cached --quiet; then
            echo "⏭️ Değişiklik yok, commit atlandı."
          else
            git commit -m "data: odds ${LABEL} [${MODE}] — ${TOTAL} maç"
            git pull --rebase origin main
            git push
            echo "✅ Push edildi: ${TOTAL} maç"
          fi

      # ── Artifact yükle ────────────────────────────────────────────────────
      - name: Artifact yükle (yedek)
        if: ${{ inputs.dry_run != true }}
        uses: actions/upload-artifact@v4
        with:
          name: "odds-${{ steps.dates.outputs.label }}-${{ inputs.mode }}"
          path: data/odds_*.json.gz
          retention-days: 90
          compression-level: 0
          if-no-files-found: warn

      # ── İş özeti ─────────────────────────────────────────────────────────
      - name: Özet
        if: always()
        run: |
          echo "## 📊 Scrape Özeti" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Dönem          | ${{ steps.dates.outputs.date_from }} → ${{ steps.dates.outputs.date_to }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Mod            | ${{ inputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📂 Çıktı şekli   | $([ '${{ inputs.split }}' = 'true' ] && echo 'Ayrı dosyalar' || echo 'Tek birleşik') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Dry Run        | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📈 Sofa Tüm Mkt   | ${{ inputs.sofa_all_markets }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Supabase       | ${{ inputs.save_supabase }} |" >> $GITHUB_STEP_SUMMARY
