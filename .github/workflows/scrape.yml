name: 🏟️ Odds Scraper (Sofascore + Mackolik)

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Tarih (YYYY-MM-DD) — boş bırakırsan bugün"
        required: false
        default: ""
        type: string

      mode:
        description: "Kaynak"
        required: false
        default: "combined"
        type: choice
        options:
          - combined
          - sofa
          - mac

      sofa_all_markets:
        description: "Sofascore: her maç için tüm marketleri çek (yavaş!)"
        required: false
        default: false
        type: boolean

      iddaa_only:
        description: "Mackolik: sadece iddaa oranı olan maçlar"
        required: false
        default: true
        type: boolean

      dry_run:
        description: "Dry run — sadece listele, kaydetme"
        required: false
        default: false
        type: boolean

      save_supabase:
        description: "Supabase'e kaydet"
        required: false
        default: false
        type: boolean

      sofa_delay:
        description: "Sofascore istek gecikmesi (s)"
        required: false
        default: "0.5"
        type: string

      mac_delay:
        description: "Mackolik istek gecikmesi (s)"
        required: false
        default: "1.5"
        type: string

concurrency:
  group: odds-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: "Oranları Çek → JSON.GZ"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Tarihi belirle
        id: set_date
        run: |
          if [ -z "${{ inputs.date }}" ]; then
            echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          else
            echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          fi

      - name: Oranları çek
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p output
          DATE=${{ steps.set_date.outputs.date }}

          ARGS="--date $DATE"
          ARGS="$ARGS --mode ${{ inputs.mode }}"
          ARGS="$ARGS --sofa-delay ${{ inputs.sofa_delay }}"
          ARGS="$ARGS --mac-delay ${{ inputs.mac_delay }}"
          ARGS="$ARGS --output-json output/odds_${DATE}_${{ inputs.mode }}.json.gz"

          [ "${{ inputs.dry_run }}"        = "true"  ] && ARGS="$ARGS --dry-run"
          [ "${{ inputs.iddaa_only }}"     = "false" ] && ARGS="$ARGS --all"
          [ "${{ inputs.sofa_all_markets }}" = "true" ] && ARGS="$ARGS --sofa-all-markets"
          [ "${{ inputs.save_supabase }}"  = "false" ] && ARGS="$ARGS --no-supabase"

          echo "Komut: python -m scraper.main $ARGS"
          python -m scraper.main $ARGS

      - name: Dosya boyutu
        if: "!inputs.dry_run"
        run: ls -lh output/ 2>/dev/null || echo "output/ boş"

      - name: Artifact yükle
        if: "!inputs.dry_run"
        uses: actions/upload-artifact@v4
        with:
          name: "odds-${{ steps.set_date.outputs.date }}-${{ inputs.mode }}"
          path: output/odds_*.json.gz
          retention-days: 90
          compression-level: 0
          if-no-files-found: warn

      - name: Özet
        if: always()
        run: |
          echo "## 📊 Scrape Özeti" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Tarih         | ${{ steps.set_date.outputs.date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Mod           | ${{ inputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Dry Run       | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📈 Sofa Tüm Mkt  | ${{ inputs.sofa_all_markets }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Supabase      | ${{ inputs.save_supabase }} |" >> $GITHUB_STEP_SUMMARY
